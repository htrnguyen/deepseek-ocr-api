version: '3.9'

services:
  deepseek-ocr-api:
    build: .
    container_name: deepseek-ocr-api
    ports:
      - "8000:8000"
    volumes:
      - ./DocLayout-YOLO-DocStructBench:/app/DocLayout-YOLO-DocStructBench:ro
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    restart: unless-stopped
